<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="Register.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo"><a href="#">AdaptEd</a></div>
            <ul>
                <li><ion-icon name="home-outline"></ion-icon>
                <a href="Home.html">Home</a></li>
                <li><ion-icon name="people-outline"></ion-icon>
                <a href="#">About Us</a></li>
                <li><ion-icon name="call-outline"></ion-icon>
                <a href="#">Contact</a></li>
                <li><button onclick="location.href='Login.html'">Login</button></li>
                <li><button onclick="location.href='register.html'">Register</button></li>
            </ul>
        </div>
    </nav>
    
    <section>
        <div class="form-box">
            <div class="form-value">
                <form action="">
                    <h2>Register Now!</h2>
                    <div class="inputbox">
                        <ion-icon name="person-outline"></ion-icon>
                        <input type="text" required>
                        <label for="">Username</label>
                        </div>
                    </div>
                    <div class="inputbox">
                        <ion-icon name="person-outline"></ion-icon>
                        <input type="text" required>
                        <label for="">Name</label>
                    </div>
                    <div class="inputbox">
                        <ion-icon name="call-outline"></ion-icon>
                        <input type="number" required>
                        <label for="">Phone No.</label>
                    </div>
                    <div class="inputbox">
                        <ion-icon name="mail-outline"></ion-icon>
                        <input type="text" required>
                        <label for="">Email</label>
                    </div>
                    <div class="inputbox">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" required>
                        <label for="">Password</label>
                    </div>
                    <button>Register Now</button>
                    <div class="register">
                        <p>Already Have An Account? <a href="Login.html">Login</a> </p>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
